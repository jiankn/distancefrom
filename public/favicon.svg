<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Pin A (origin) -->
  <circle cx="8" cy="22" r="2.5" fill="#0284c7"/>
  <circle cx="8" cy="22" r="1" fill="#fff"/>
  <!-- Pin B (destination) -->
  <circle cx="24" cy="10" r="2.5" fill="#0284c7"/>
  <circle cx="24" cy="10" r="1" fill="#fff"/>
